image: python:3.11-alpine

stages:
  - test
  - build

test:
  stage: test
  coverage: '/TOTAL.+ ([0-9]{1,3}%)/'
  script:
    - pip install -r requirements.txt
    - pip install -e .
    - coverage run -m pytest --junitxml=junit.xml tests/
    - coverage report
    - coverage xml
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week
    
build:
  stage: build
  script:
    - pip install -r ./requirements.txt
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/*.whl
    expire_in: 1 week