image: python:3.10.15-alpine3.20

stages:
  - test
  - build

test:
  stage: test
  coverage: '/^TOTAL\s+\d+\s+\d+\s+\d+\s+(\d+)%$/'
  script:
    - pip install -r requirements.txt
    - pip install -e .
    - coverage run -m pytest tests/
    - coverage report
    - coverage xml
  artifacts:
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
    expire_in: 1 week
    
build:
  stage: build
  script:
    - pip install -r ./requirements.txt
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/*.whl
    expire_in: 1 week